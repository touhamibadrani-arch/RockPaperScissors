<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Rock Paper Scissors</title>
    <style>
      /* Ensure the game fills the whole screen and stays dark */
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #111;
        /* Prevents mobile double-tap zoom and scrolling */
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      // --- YOUR GAME CODE START ---
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      document.body.appendChild(canvas);

      let W = window.innerWidth,
        H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;

      window.onresize = () => {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
      };

      //  GAME DATA
      const CHOICES = ["Rock", "Paper", "Scissors"];
      const RULES = {
        Rock: "Scissors",
        Paper: "Rock",
        Scissors: "Paper",
      };

      let state = "menu";
      let player = null,
        ai = null,
        result = "";
      let score = { p: 0, ai: 0 };

      //  INPUT
      canvas.onclick = (e) => {
        if (state === "menu") state = "play";
        else if (state === "play") {
          const x = e.clientX;
          player = x < W / 3 ? "Rock" : x < (2 * W) / 3 ? "Paper" : "Scissors";
          ai = CHOICES[Math.floor(Math.random() * 3)];

          if (player === ai) result = "DRAW";
          else if (RULES[player] === ai) {
            result = "YOU WIN";
            score.p++;
          } else {
            result = "YOU LOSE";
            score.ai++;
          }

          state = "result";
        } else if (state === "result") {
          state = "play";
        }
      };

      //  DRAW
      function drawText(t, x, y, s = 30, color = "#fff") {
        ctx.fillStyle = color;
        ctx.font = `bold ${s}px Arial`;
        ctx.textAlign = "center";
        ctx.fillText(t, x, y);
      }

      //  LOOP
      function loop() {
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, W, H);

        if (state === "menu") {
          drawText("ROCK PAPER SCISSORS", W / 2, H / 2 - 40, 40);
          drawText("CLICK TO START", W / 2, H / 2 + 40, 20);
        }

        if (state === "play") {
          // Added subtle dividers to help the player see the 3 zones
          ctx.strokeStyle = "#333";
          ctx.beginPath();
          ctx.moveTo(W / 3, 0);
          ctx.lineTo(W / 3, H);
          ctx.moveTo((2 * W) / 3, 0);
          ctx.lineTo((2 * W) / 3, H);
          ctx.stroke();

          drawText("ROCK", W / 6, H / 2);
          drawText("PAPER", W / 2, H / 2);
          drawText("SCISSORS", (5 * W) / 6, H / 2);
        }

        if (state === "result") {
          drawText(`YOU: ${player}`, W / 2, H / 2 - 60);
          drawText(`AI: ${ai}`, W / 2, H / 2 - 20);

          // Highlight result color
          let resColor = "#fff";
          if (result === "YOU WIN") resColor = "#4CAF50";
          if (result === "YOU LOSE") resColor = "#F44336";

          drawText(result, W / 2, H / 2 + 60, 50, resColor);
          drawText("CLICK TO CONTINUE", W / 2, H - 80, 20);
        }

        // Scoreboard
        drawText(`PLAYER: ${score.p}`, 100, 50, 20, "#4CAF50");
        drawText(`AI: ${score.ai}`, W - 100, 50, 20, "#F44336");

        requestAnimationFrame(loop);
      }

      loop();
      // --- YOUR GAME CODE END ---
    </script>
  </body>
</html>
